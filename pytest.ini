[pytest]
testpaths = tests
addopts = -p no:warnings

markers =
    sw: pure-software tests — no hardware or ROS2 required (CI-safe)
    unit: single hardware component test
    integration: sensor→actuator chain test
    rov: requires live BlueROV2 + MAVProxy on udp:127.0.0.1:14551
    visual: physically moves motors — operator must be present
    sequential: enforce sequential execution (no GPIO conflicts)
